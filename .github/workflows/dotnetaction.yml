name: .NET Build

on:
  push:
    branches:
      - master
      - deploy
  pull_request:
    branches:
      - master
      - deploy

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BeanBot.sln

      - name: Build
        run: dotnet build BeanBot.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish BeanBot/BeanBot.csproj --configuration Release --no-build --output ./artifacts/publish

      - name: Vulnerability Audit
        run: dotnet list BeanBot/BeanBot.csproj package --vulnerable --include-transitive
