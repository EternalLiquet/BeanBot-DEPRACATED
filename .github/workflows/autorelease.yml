name: Bean Bot Automated Release/Versioning

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BeanBot.sln

      - name: Build
        run: dotnet build BeanBot.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish BeanBot/BeanBot.csproj --configuration Release --no-build --output ./artifacts/publish

  release-on-push:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: rymndhng/release-on-push-action@v0.28.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          bump_version_scheme: minor
          use_github_release_notes: true
